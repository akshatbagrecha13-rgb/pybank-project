<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>UPI Transfer</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#f4f7fb;color:#1f2937;min-height:100vh}
.nav{background:#173b75;color:white;padding:16px 40px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 4px 14px rgba(0,0,0,.15)}
.nav a{color:white;text-decoration:none;margin-left:18px;font-weight:bold}
.logo{font-size:25px;font-weight:bold}
.container{max-width:1150px;margin:28px auto;padding:0 18px}
.card{background:white;border-radius:16px;padding:24px;margin-bottom:22px;box-shadow:0 8px 24px rgba(0,0,0,.08)}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:18px}
.stat{background:linear-gradient(135deg,#173b75,#2f5597);color:white;border-radius:16px;padding:24px}
.stat h2{font-size:32px;margin-bottom:8px}
.btn{display:inline-block;background:#173b75;color:white;padding:12px 18px;border:none;border-radius:10px;text-decoration:none;font-weight:bold;cursor:pointer}
.btn.red{background:#b91c1c}.btn.green{background:#15803d}.btn.gray{background:#475569}
input,select,textarea{width:100%;padding:12px;margin:8px 0 16px;border:1px solid #cbd5e1;border-radius:10px;font-size:15px}
textarea{height:90px;resize:none}
label{font-weight:bold}
table{width:100%;border-collapse:collapse;background:white;border-radius:14px;overflow:hidden}
th,td{padding:13px;border-bottom:1px solid #e5e7eb;text-align:left}
th{background:#173b75;color:white}
.msg{padding:12px;border-radius:10px;background:#dbeafe;color:#173b75;margin-bottom:16px;font-weight:bold}
.actions a{margin-right:10px}
.small{font-size:14px;color:#64748b}
.center{max-width:520px;margin:40px auto}
</style>

</head>
<body>

<div class="nav">
  <div class="logo">🏦 PyBank</div>
  <div>
    <a href="{{ url_for('dashboard') }}">Dashboard</a>
    <a href="{{ url_for('deposit') }}">Deposit</a>
    <a href="{{ url_for('withdraw') }}">Withdraw</a>
    <a href="{{ url_for('transfer') }}">Transfer</a>
    <a href="{{ url_for('transactions') }}">History</a>
    <a href="{{ url_for('logout') }}">Logout</a>
  </div>
</div>

<div class="container center">

{% with messages = get_flashed_messages() %}
  {% if messages %}
    {% for message in messages %}
      <div class="msg">{{ message }}</div>
    {% endfor %}
  {% endif %}
{% endwith %}

<div class="card">
<h1>UPI Transfer</h1><br>
<form method="POST">

<label>Select Account</label>
<select name="from_account_id" required>
{% for acc in accounts %}
<option value="{{ acc.account_id }}">{{ acc.account_number }} - {{ acc.account_type }} - ₹{{ "%.2f"|format(acc.balance) }}</option>
{% endfor %}
</select>

<label>Receiver UPI ID</label>
<input type="text" name="to_upi_id" placeholder="example@pybank" required>
<label>Amount</label>
<input type="number" step="0.01" name="amount" required>
<label>PIN</label>
<input type="password" name="pin" maxlength="4" required>
<button class="btn" type="submit">Send UPI Payment</button>
</form>
</div>
</div></body></html>
